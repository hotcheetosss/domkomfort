<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ — Дом Комфорт</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Manrope', 'sans-serif'] },
        colors: {
          primary: {
            50: '#F1F7F3', 100: '#E1EFE6', 200: '#C3DFCD', 300: '#9CC9AB',
            400: '#7BBF9E', 500: '#3E9569', 600: '#2D7B53', 700: '#216140',
            800: '#1B4D32', 900: '#164432',
          },
          graphite: '#222222',
        }
      }
    }
  }
</script>

<link rel="stylesheet" href="/admin/assets/css/admin.css" />
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/admin/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/admin/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/admin/apple-touch-icon.png" />
<link rel="shortcut icon" href="/admin/favicon.ico" />
<meta name="theme-color" content="#164432" />
</head>
<body class="bg-gray-50 text-graphite antialiased">

<!-- Страница логина -->
<div id="page-login" class="admin-page min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-6">
        <svg class="w-10 h-10 text-primary-700" viewBox="0 0 60 60" fill="none">
          <path d="M18 45 L18 25 L30 15 L30 45 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M30 45 L30 22 L42 30 L42 45 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M14 45 L18 45 L18 32 Z" fill="currentColor"/>
        </svg>
        <div>
          <div class="font-semibold text-xl text-primary-900">Дом Комфорт</div>
          <div class="text-xs text-graphite/50 uppercase tracking-widest">Админ-панель</div>
        </div>
      </div>
      <h1 class="text-2xl font-semibold text-graphite">Вход для сотрудников</h1>
    </div>

    <form id="login-form" class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-graphite mb-2" for="login-phone">Номер телефона</label>
        <input id="login-phone" name="phone" type="tel" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" />
      </div>

      <div>
        <label class="block text-sm font-medium text-graphite mb-2" for="login-password">Пароль</label>
        <input id="login-password" name="password" type="password" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" />
      </div>

      <div id="login-error" class="hidden px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>

      <button type="submit" id="login-submit"
        class="w-full py-3 bg-primary-700 hover:bg-primary-800 text-white font-medium rounded-lg transition">
        Войти
      </button>
    </form>

    <div class="text-center mt-6">
      <a href="/" class="text-sm text-graphite/60 hover:text-primary-700 transition">← Вернуться на сайт</a>
    </div>
  </div>
</div>

<!-- Основная админка (после логина) -->
<div id="page-app" class="admin-page hidden min-h-screen md:flex">

  <!-- Мобильный хедер (виден только на < 768px) -->
  <header class="md:hidden sticky top-0 z-30 bg-primary-900 text-white px-4 py-3 flex items-center justify-between shadow-sm">
    <button id="sidebar-toggle" class="p-2 -ml-2 rounded-lg hover:bg-primary-800 transition" aria-label="Меню">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="flex items-center gap-2">
      <svg class="w-6 h-6" viewBox="0 0 60 60" fill="none">
        <path d="M18 45 L18 25 L30 15 L30 45 Z" stroke="#7BBF9E" stroke-width="2.5" fill="none"/>
        <path d="M30 45 L30 22 L42 30 L42 45 Z" stroke="#7BBF9E" stroke-width="2.5" fill="none"/>
        <path d="M14 45 L18 45 L18 32 Z" fill="#7BBF9E"/>
      </svg>
      <span class="font-semibold text-sm">Дом Комфорт</span>
    </div>
    <div class="w-8"></div>
  </header>

  <!-- Overlay для закрытия sidebar по клику вне (виден только когда sidebar открыт) -->
  <div id="sidebar-overlay" class="md:hidden hidden fixed inset-0 bg-black/50 z-40"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-primary-900 text-white flex-shrink-0 flex flex-col fixed md:static inset-y-0 left-0 z-50 -translate-x-full md:translate-x-0 transition-transform duration-200">
    <div class="p-6 border-b border-primary-800">
      <div class="flex items-center gap-3">
        <svg class="w-8 h-8" viewBox="0 0 60 60" fill="none">
          <path d="M18 45 L18 25 L30 15 L30 45 Z" stroke="#7BBF9E" stroke-width="2.5" fill="none"/>
          <path d="M30 45 L30 22 L42 30 L42 45 Z" stroke="#7BBF9E" stroke-width="2.5" fill="none"/>
          <path d="M14 45 L18 45 L18 32 Z" fill="#7BBF9E"/>
        </svg>
        <div>
          <div class="font-semibold text-sm">Дом Комфорт</div>
          <div class="text-[11px] text-primary-300 uppercase tracking-widest">Админка</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a href="#" data-section="dashboard" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Главная</span>
      </a>
      <a href="#" data-section="properties" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Объекты</span>
      </a>
      <a href="#" data-section="agents" class="nav-item admin-only">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Агенты</span>
      </a>
      <a href="#" data-section="leads" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Заявки</span>
      </a>
      <a href="#" data-section="reviews" class="nav-item admin-only">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Отзывы</span>
      </a>
    </nav>

    <div class="p-4 border-t border-primary-800">
      <button id="profile-btn" class="w-full text-left flex items-center gap-3 rounded-lg hover:bg-primary-800 transition p-2 relative">
        <div class="w-10 h-10 rounded-full bg-primary-700 flex items-center justify-center font-semibold flex-shrink-0" id="user-avatar">—</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate" id="user-phone">—</div>
          <div class="text-xs text-primary-300" id="user-role">—</div>
        </div>
        <span class="text-primary-200 flex-shrink-0">▾</span>
      </button>
      
      <!-- Выпадающее меню профиля -->
      <div id="profile-menu" class="hidden absolute bottom-24 left-4 w-56 bg-primary-800 rounded-lg shadow-lg border border-primary-700 py-1 z-50">
        <button id="change-password-btn" class="w-full text-left px-4 py-2.5 text-sm text-primary-100 hover:bg-primary-700 transition flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0"><path d="M12 1v6m0 12v6M4.22 4.22l4.24 4.24m6.08 0l4.24-4.24M1 12h6m12 0h6M4.22 19.78l4.24-4.24m6.08 0l4.24 4.24"/></svg>
          Сменить пароль
        </button>
        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm text-primary-100 hover:bg-primary-700 transition flex items-center gap-2 border-t border-primary-700">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Выйти
        </button>
      </div>
    </div>
  </aside>

<!-- Main content area -->
  <main class="flex-1 overflow-auto md:min-h-screen">
    <div id="admin-content" class="p-4 sm:p-6 md:p-8"></div>
  </main>
</div>

<!-- Модалка смены пароля -->
<div id="change-password-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-lg max-w-md w-full">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-graphite">Сменить пароль</h2>
      <button id="modal-close-btn" class="text-graphite/60 hover:text-graphite transition">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <form id="change-password-form" class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-graphite mb-2">Текущий пароль</label>
        <input type="password" id="current-password" required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-graphite mb-2">Новый пароль (мин. 8 символов)</label>
        <input type="password" id="new-password" required minlength="8"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-graphite mb-2">Повторите новый пароль</label>
        <input type="password" id="confirm-password" required minlength="8"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" />
      </div>

      <div id="form-error" class="hidden px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
      <div id="form-success" class="hidden px-4 py-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg"></div>

      <div class="flex gap-3 pt-2">
        <button type="button" id="modal-cancel-btn" class="flex-1 px-4 py-2.5 border border-gray-300 text-graphite font-medium rounded-lg hover:bg-gray-50 transition">
          Отмена
        </button>
        <button type="submit" id="modal-submit-btn" class="flex-1 px-4 py-2.5 bg-primary-700 hover:bg-primary-800 text-white font-medium rounded-lg transition">
          Сменить пароль
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Уведомление о успехе -->
<div id="success-toast" class="hidden fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-pulse">
  ✓ Пароль обновлён
</div>

<script type="module" src="/admin/assets/js/app.js"></script>
</body>
</html>
